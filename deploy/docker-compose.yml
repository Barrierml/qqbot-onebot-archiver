services:
  qqbot:
    build:
      context: ..
    image: qqbot:0.1.4
    container_name: qqbot
    restart: unless-stopped
    environment:
      QQBOT_HOST: 0.0.0.0
      QQBOT_PORT: "8080"
      QQBOT_DATA_DIR: /data
      QQBOT_ONEBOT_WS_URLS: ${QQBOT_ONEBOT_WS_URLS}
      QQBOT_ONEBOT_ACCESS_TOKEN: ${QQBOT_ONEBOT_ACCESS_TOKEN:-}
      QQBOT_ONEBOT_HTTP_URL: ${QQBOT_ONEBOT_HTTP_URL:-}
      QQBOT_ONEBOT_HTTP_ACCESS_TOKEN: ${QQBOT_ONEBOT_HTTP_ACCESS_TOKEN:-}
      QQBOT_ONEBOT_HTTP_TIMEOUT: ${QQBOT_ONEBOT_HTTP_TIMEOUT:-10}
      QQBOT_EXPAND_FORWARD_MESSAGES: ${QQBOT_EXPAND_FORWARD_MESSAGES:-true}
      QQBOT_NICKNAMES: ${QQBOT_NICKNAMES:-qqbot}
      QQBOT_SUPERUSERS: ${QQBOT_SUPERUSERS:-}
      QQBOT_GROUP_MODE: ${QQBOT_GROUP_MODE:-mention}
      QQBOT_PRIVATE_REPLIES: ${QQBOT_PRIVATE_REPLIES:-true}
      QQBOT_RULES_JSON: ${QQBOT_RULES_JSON:-[]}
      QQBOT_REACTION_WEBHOOK: ${QQBOT_REACTION_WEBHOOK:-}
    volumes:
      - qqbot_data:/data
    ports:
      - "8080:8080"

volumes:
  qqbot_data:
